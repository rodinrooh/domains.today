name: Reveal Domains

on:
  schedule:
    - cron: '*/5 * * * *'   # Fallback every 5 min if chain breaks
  workflow_dispatch:

permissions:
  actions: write

jobs:
  reveal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Reveal 1 domain every ~2 seconds for 60 seconds
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          for i in $(seq 1 45); do
            python scripts/reveal_one.py
            sleep 1
          done

      - name: Chain next run
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run reveal.yml --repo ${{ github.repository }}
